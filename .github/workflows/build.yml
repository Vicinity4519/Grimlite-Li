name: Build Grimoire

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.1

    - name: Restore NuGet packages
      run: nuget restore "Project Grimlite.sln"

    - name: Build solution
      run: msbuild "Project Grimlite.sln" /p:Configuration=Release /p:TargetFrameworkVersion=v4.8

    - name: Create ZIP archive
      run: |
        $compress = @{
          Path = @(
            "bin\Release\Grimoire.exe",
            "bin\Debug\CharSelect.cfg",
            "bin\Debug\ClientConfig.cfg",
            "bin\Debug\config.cfg",
            "bin\Debug\hotkeys.json"
            "bin\Debug\Loader\",
            "resources\Bots\",
            "resources\Notes\",
            "resources\Plugins"
          )
          CompressionLevel = "Fastest"
          DestinationPath = "Grimoire.zip"
        }
        Compress-Archive @compress

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: Grimoire
        path: Grimoire.zip

